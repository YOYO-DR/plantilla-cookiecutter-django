volumes:
  backend_local_postgres_data: {}
  backend_local_postgres_data_backups: {}
  backend_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: backend_local_django
    container_name: backend_local_django
    restart: unless-stopped
    depends_on:
      - pgbouncer
      - redis
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: backend_production_postgres
    container_name: backend_local_postgres
    restart: unless-stopped
    volumes:
      - backend_local_postgres_data:/var/lib/postgresql/18/docker
      - backend_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  pgbouncer:
    build:
      context: .
      dockerfile: ./compose/production/pgbouncer/Dockerfile
    image: backend_local_pgbouncer
    container_name: backend_local_pgbouncer
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - ./.envs/.local/.postgres
    ports:
      - '6432:6432'

  redis:
    image: docker.io/redis:8.6
    container_name: backend_local_redis
    restart: unless-stopped
    volumes:
      - backend_local_redis_data:/data

  celeryworker:
    <<: *django
    image: backend_local_celeryworker
    container_name: backend_local_celeryworker
    restart: unless-stopped
    depends_on:
      - redis
      - pgbouncer
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: backend_local_celerybeat
    container_name: backend_local_celerybeat
    restart: unless-stopped
    depends_on:
      - redis
      - pgbouncer
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: backend_local_flower
    container_name: backend_local_flower
    restart: unless-stopped
    ports:
      - '5555:5555'
    command: /start-flower
