{% extends "base.html" %}
{% load i18n %}

{% block title %}
  {% translate "Change Password" %}
{% endblock title %}

{% block content %}
  <h1>{% translate "Change Password" %}</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{% translate "Update Password" %}</button>
  </form>
{% endblock content %}
