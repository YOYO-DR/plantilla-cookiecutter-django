{% extends "base.html" %}
{% load i18n %}

{% block title %}
  {% translate "Sign In" %}
{% endblock title %}

{% block content %}
  <h1>{% translate "Sign In" %}</h1>
  <form method="post" action="{% url 'users:login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{% translate "Sign In" %}</button>
  </form>
  <p class="mt-3">
    <a href="{% url 'users:password_reset' %}">{% translate "Forgot your password?" %}</a>
  </p>
{% endblock content %}
