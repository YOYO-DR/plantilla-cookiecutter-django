volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_django_media: {}
  production_django_logs: {}
  production_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    image: backend_production_django
    volumes:
      - production_django_media:/app/apps/media
      - production_django_logs:/app/logs
    restart: unless-stopped
    depends_on:
      - pgbouncer
      - redis
    env_file:
      - ./.env
    command: /start
    deploy:
      resources:
        reservations:
          cpus: '0.5'
          memory: 256M
        limits:
          cpus: ${DJANGO_CPU:-1}
          memory: ${DJANGO_RAM:-1g}
    networks:
      - dokploy-network
      - default

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: backend_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/18/docker
      - production_postgres_data_backups:/backups
    restart: unless-stopped
    env_file:
      - ./.env

  pgbouncer:
    build:
      context: .
      dockerfile: ./compose/production/pgbouncer/Dockerfile
    image: backend_production_pgbouncer
    restart: unless-stopped
    env_file:
      - ./.env
    deploy:
      resources:
        reservations:
          cpus: '0.1'
          memory: 123M
        limits:
          cpus: ${PGBOUNCER_CPU:-1}
          memory: ${PGBOUNCER_RAM:-1g}
    networks:
      - dokploy-network
      - default

  traefik:
    build:
      context: .
      dockerfile: ./compose/production/traefik/Dockerfile
    image: backend_production_traefik
    depends_on:
      - django
    restart: unless-stopped
    env_file:
      - ./.env
    deploy:
      resources:
        reservations:
          cpus: '0.1'
          memory: 123M
        limits:
          cpus: ${TRAEFIK_CPU:-1}
          memory: ${TRAEFIK_RAM:-1g}

  redis:
    image: docker.io/redis:7.2
    restart: unless-stopped
    volumes:
      - production_redis_data:/data

  celeryworker:
    <<: *django
    image: backend_production_celeryworker
    ports: []
    restart: unless-stopped
    command: /start-celeryworker
    deploy:
      replicas: ${CANT_WORKERS_CELERY:-2}
      resources:
        reservations:
          cpus: '0.5'
          memory: 256M
        limits:
          cpus: ${CELERYWORKER_CPU:-1}
          memory: ${CELERYWORKER_RAM:-1g}
    networks:
      - dokploy-network
      - default

  celerybeat:
    <<: *django
    image: backend_production_celerybeat
    restart: unless-stopped
    volumes:
      - production_django_media:/app/apps/media
    command: /start-celerybeat
    deploy:
      resources:
        reservations:
          cpus: '0.5'
          memory: 256M
        limits:
          cpus: ${CELERYBEAT_CPU:-1}
          memory: ${CELERYBEAT_RAM:-1g}
    networks:
      - dokploy-network
      - default

  flower:
    <<: *django
    image: backend_production_flower
    restart: unless-stopped
    command: /start-flower

  nginx:
    build:
      context: .
      dockerfile: ./compose/production/nginx/Dockerfile
    image: backend_production_nginx
    depends_on:
      - django
    volumes:
      - production_django_media:/usr/share/nginx/media:ro
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          cpus: '0.1'
          memory: 123M
        limits:
          cpus: ${NGINX_CPU:-1}
          memory: ${NGINX_RAM:-1g}

networks:
  dokploy-network:
    external: true
